<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saída de Produtos</title>
    <link rel="stylesheet" type="text/css" href="styles.css" media="screen" />
    <script>
        const apiUrl = "http://localhost:3000"; // Alterar para o URL do backend em produção
        let produtoAtual = null;

        // Função para buscar produto pelo SKU
        async function buscarProduto() {
            const skuInput = document.getElementById("skuInput").value;

            if (!skuInput) {
                alert("Por favor, insira um SKU.");
                return;
            }

            try {
                const response = await fetch(`${apiUrl}/produtos/${skuInput}`);
                if (!response.ok) {
                    throw new Error("Produto não encontrado!");
                }

                produtoAtual = await response.json();
                atualizarDetalhesProduto(produtoAtual);
            } catch (error) {
                alert("Erro ao buscar o produto: " + error.message);
            }
        }

        // Atualiza os detalhes do produto na tela
        function atualizarDetalhesProduto(produto) {
            const detalhesDiv = document.getElementById("detalhesProduto");
            detalhesDiv.innerHTML = `
                <p><strong>Código:</strong> ${produto.codigo}</p>
                <p><strong>Nome:</strong> ${produto.produto}</p>
                <p><strong>Cor:</strong> ${produto.cor}</p>
                <p><strong>Espessura:</strong> ${produto.espessura}</p>
                <p><strong>Peso:</strong> ${produto.peso}</p>
                <p><strong>SKU:</strong> ${produto.sku}</p>
            `;

            document.getElementById("formCorredorVaga").style.display = "block";
            document.getElementById("btnExcluir").style.display = "inline-block";
        }

        // Função para excluir produto pelo SKU
        async function excluirProduto() {
            if (!produtoAtual || !produtoAtual.sku) {
                alert("Nenhum produto selecionado para exclusão.");
                return;
            }

            const confirmacao = confirm("Tem certeza que deseja excluir este produto?");
            if (!confirmacao) return;

            try {
                const response = await fetch(`${apiUrl}/produtos/${produtoAtual.sku}`, {
                    method: "DELETE",
                });

                if (!response.ok) {
                    throw new Error("Erro ao excluir o produto!");
                }

                alert("Produto excluído com sucesso!");
                limparTela();
            } catch (error) {
                alert("Erro ao excluir o produto: " + error.message);
            }
        }

        // Função para fixar corredor e vaga e adicionar ao relatório
        async function salvarCorredorVaga() {
            const corredor = document.getElementById("corredorInput").value;
            const vaga = document.getElementById("vagaInput").value;

            if (!produtoAtual) {
                alert("Nenhum produto selecionado.");
                return;
            }

            if (!corredor || !vaga) {
                alert("Por favor, preencha corredor e vaga.");
                return;
            }

            try {
                const produtoAtualizado = {
                    ...produtoAtual,
                    corredor,
                    vaga,
                };

                const response = await fetch(`${apiUrl}/produtos/${produtoAtual.sku}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(produtoAtualizado),
                });

                if (!response.ok) {
                    throw new Error("Erro ao salvar corredor e vaga!");
                }

                alert("Corredor e vaga fixados com sucesso!");
                limparTela();
            } catch (error) {
                alert("Erro ao salvar corredor e vaga: " + error.message);
            }
        }

        // Função para limpar a tela após uma operação
        function limparTela() {
            produtoAtual = null;
            document.getElementById("skuInput").value = "";
            document.getElementById("detalhesProduto").innerHTML = "";
            document.getElementById("formCorredorVaga").style.display = "none";
            document.getElementById("btnExcluir").style.display = "none";
        }
    </script>
</head>
<body>
    <h1>Saída de Produtos</h1>
    <div>
        <label for="skuInput">Digite o SKU:</label>
        <input type="text" id="skuInput" placeholder="Digite o SKU" />
        <button onclick="buscarProduto()">Buscar Produto</button>
    </div>

    <div id="detalhesProduto" style="margin-top: 20px;"></div>

    <form id="formCorredorVaga" style="display: none; margin-top: 20px;" onsubmit="event.preventDefault(); salvarCorredorVaga();">
        <label for="corredorInput">Corredor:</label>
        <input type="text" id="corredorInput" placeholder="Digite o corredor" required />

        <label for="vagaInput">Vaga:</label>
        <input type="text" id="vagaInput" placeholder="Digite a vaga" required />

        <button type="submit">Fixar Corredor e Vaga</button>
    </form>

    <button id="btnExcluir" style="display: none; margin-top: 10px;" onclick="excluirProduto()">Excluir Produto</button>
</body>
</html>
